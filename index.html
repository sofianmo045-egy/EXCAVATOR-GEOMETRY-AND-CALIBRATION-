<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excavator Geometry</title><style>
body { font-family: Arial; background:#f1f5f9; margin:0; }
.card { max-width:600px; margin:auto; background:#fff; border-radius:15px; overflow:hidden; }
.header { background:#0f172a; color:#fff; padding:15px; text-align:center; }
.tabs { display:flex; background:#1e293b; }
.tab-btn { flex:1; padding:10px; color:#94a3b8; background:none; border:none; cursor:pointer; }
.tab-btn.active { color:#fff; border-bottom:2px solid #38bdf8; }
.tab-content { display:none; padding:15px; }
.tab-content.active { display:block; }
input { width:100%; padding:8px; margin:3px 0; text-align:center; }
button { width:100%; padding:12px; margin-top:10px; background:#059669; color:#fff; border:none; border-radius:8px; }
#threeContainer { width:100%; height:400px; }
</style></head><body><div class="card"><div class="header">
<h2>Excavator Geometry</h2>
</div><div class="tabs">
<button class="tab-btn active" onclick="openTab(event,'calib')">Calibration</button>
<button class="tab-btn" onclick="openTab(event,'diagram')">3D View</button>
</div><div id="calib" class="tab-content active"><h4>Boom Pin</h4>
<input id="x_bp" placeholder="X">
<input id="y_bp" placeholder="Y">
<input id="z_bp" placeholder="Z"><h4>Stick Pin</h4>
<input id="x_st">
<input id="y_st">
<input id="z_st"><h4>Bucket Pin</h4>
<input id="x_bu">
<input id="y_bu">
<input id="z_bu"><button onclick="calc()">Calculate + Show 3D</button>

</div><div id="diagram" class="tab-content">
<div id="threeContainer"></div>
</div></div><!-- 3D LIB --><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script><script>

// ===== TAB =====
function openTab(evt, id){
document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
evt.currentTarget.classList.add('active');
}

// ===== GET POINT =====
function getP(id){
const x=parseFloat(document.getElementById('x_'+id).value);
const y=parseFloat(document.getElementById('y_'+id).value);
const z=parseFloat(document.getElementById('z_'+id).value);
if(isNaN(x)||isNaN(y)||isNaN(z)) return null;
return {x,y,z};
}

// ===== 3D ENGINE =====
let scene,camera,renderer,controls;

function init3D(){
const container=document.getElementById('threeContainer');

scene=new THREE.Scene();
scene.background=new THREE.Color(0xf1f5f9);

camera=new THREE.PerspectiveCamera(75,container.clientWidth/400,0.1,1000);
camera.position.set(5,5,5);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(container.clientWidth,400);

container.innerHTML="";
container.appendChild(renderer.domElement);

const light=new THREE.DirectionalLight(0xffffff,1);
light.position.set(10,10,10);
scene.add(light);

controls=new THREE.OrbitControls(camera,renderer.domElement);

animate();
}

function animate(){
requestAnimationFrame(animate);
if(controls) controls.update();
if(renderer) renderer.render(scene,camera);
}

// ===== DRAW =====
function drawPoint(p,color){
if(!p) return;
const geo=new THREE.SphereGeometry(0.15);
const mat=new THREE.MeshStandardMaterial({color});
const m=new THREE.Mesh(geo,mat);
m.position.set(p.x,p.y,p.z);
scene.add(m);
}

function drawLine(p1,p2){
if(!p1||!p2) return;
const material=new THREE.LineBasicMaterial();
const points=[
new THREE.Vector3(p1.x,p1.y,p1.z),
new THREE.Vector3(p2.x,p2.y,p2.z)
];
const geo=new THREE.BufferGeometry().setFromPoints(points);
const line=new THREE.Line(geo,material);
scene.add(line);
}

// ===== MAIN =====
function calc(){

const BP=getP('bp');
const ST=getP('st');
const BU=getP('bu');

if(!BP||!ST||!BU){
alert("ادخل القيم كاملة");
return;
}

// INIT 3D
init3D();

// DRAW
drawPoint(BP,0x0000ff);
drawPoint(ST,0x00ff00);
drawPoint(BU,0xff0000);

drawLine(BP,ST);
drawLine(ST,BU);

// AUTO SWITCH TAB
document.querySelectorAll('.tab-btn')[1].click();

}

</script></body>
</html>
